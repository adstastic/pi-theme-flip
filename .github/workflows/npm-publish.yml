name: Publish npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Resolve package version
        id: meta
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if npm view "pi-theme-flip@${version}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when version already published
        if: steps.meta.outputs.published == 'true'
        run: echo "pi-theme-flip@${{ steps.meta.outputs.version }} already published; skipping release."

      - name: Create tag
        if: steps.meta.outputs.published == 'false'
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists locally."
          else
            git tag "${tag}"
          fi
          git push origin "refs/tags/${tag}"

      - name: Write release notes
        if: steps.meta.outputs.published == 'false'
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          version="${{ steps.meta.outputs.version }}"
          commit="$(git rev-parse --short=12 HEAD)"

          {
            echo "pi-theme-flip ${tag}"
            echo
            echo "Automated release for package version \`${version}\` at commit \`${commit}\`."
            echo
            echo "Install:"
            echo
            echo "\`\`\`bash"
            echo "pi install npm:pi-theme-flip@${version}"
            echo "# or"
            echo "pi install git:github.com/adstastic/pi-theme-flip@${tag}"
            echo "\`\`\`"
          } > release-notes.md

      - name: Publish npm
        if: steps.meta.outputs.published == 'false'
        run: npm publish --provenance

      - name: Create or update GitHub release
        if: steps.meta.outputs.published == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "pi-theme-flip ${tag}" \
              --notes-file release-notes.md
          else
            gh release create "$tag" \
              --verify-tag \
              --title "pi-theme-flip ${tag}" \
              --notes-file release-notes.md
          fi
